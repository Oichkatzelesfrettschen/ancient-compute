# Ancient Compute - Python Project Configuration

[tool.black]
line-length = 100
target-version = ['py311']
include = '\.pyi?$'
extend-exclude = '''
/(
  # directories
  \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | build
  | dist
)/
'''

[tool.ruff]
line-length = 100
target-version = "py311"
exclude = [
    ".git",
    ".venv",
    "venv",
    "__pycache__",
    "build",
    "dist",
    ".backup_*",
]

[tool.ruff.lint]
# E/W: pycodestyle, F: pyflakes, I: isort, UP: pyupgrade, B: flake8-bugbear, SIM: flake8-simplify
select = ["E", "F", "W", "I", "UP", "B", "SIM"]
ignore = [
    "E203",   # whitespace before ':', conflicts with black
    "B008",   # do not perform function calls in default arguments (FastAPI Depends)
    "SIM108", # ternary operator -- style preference
]

[tool.ruff.lint.isort]
known-first-party = ["backend"]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
ignore_missing_imports = true
explicit_package_bases = true

[[tool.mypy.overrides]]
# PyYAML ships without bundled stubs; suppress import-untyped until
# types-PyYAML is added to dev requirements (tracked in DEFERRED_WORK.md).
module = "yaml"
ignore_missing_imports = true

# Python version policy:
#   Target runtime: Python 3.11 (minimum tested and supported version).
#   The project venv may use a newer interpreter (e.g. 3.12, 3.13); this is
#   acceptable as long as the target-version constraints above are respected.
#   Lock files: backend/requirements.lock and backend/requirements-dev.lock
#   are generated with pip-compile (pip-tools).  Regenerate with:
#     pip-compile backend/requirements.txt -o backend/requirements.lock --no-header
#     pip-compile backend/requirements-dev.txt -o backend/requirements-dev.lock --no-header
#   Install from lock files for reproducible environments:
#     pip install -r backend/requirements.lock -r backend/requirements-dev.lock

[tool.bandit]
exclude_dirs = ["tests", "*/tests/*"]
skips = ["B101", "B601"]

[tool.pytest.ini_options]
testpaths = ["backend/tests"]
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"
addopts = "-v --tb=short"

[tool.coverage.run]
source = ["backend/src"]
omit = ["*/tests/*", "*/test_*.py"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
]
